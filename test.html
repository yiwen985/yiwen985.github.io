<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input {
            margin: 0;
            padding: 0;
        }

        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }

        .jump-pager-input {
            padding: 0 10px;
            width: 30px;
            height: 24px;
            line-height: 24px;
            font-size: 12px;
            box-shadow: none;
            color: #99a2aa;
            text-align: center;
            margin: 0 5px;
            border: 1px solid #ccd0d7;
            border-radius: 4px;
            outline: none;
        }
    </style>
    <script>
        // 输入页面数回车后跳转页面
        function jumpPage(e, pageNum) {
            // 兼容FF和IE和Opera
            var event = e || window.event;
            var key = event.which || event.keyCode || event.charCode;
            if (key == 13) {
                window.location.href = window.location.host + pageNum;
                return true;
            }
            return false;
        }
    </script>
    
</head>
<body>
    <input type="number" class="jump-pager-input" min="1" onkeydown="jumpPage(event, this.value);">


    
</body>
</html>
